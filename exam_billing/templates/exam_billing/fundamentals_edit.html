<div class="modal fade show d-block" id="editModal" tabindex="-1" role="dialog" style="background: rgba(0,0,0,0.5);">
    <div class="modal-dialog" role="document">
        <div class="modal-content shadow-lg border-0">
            <form method="post" action="{{ request.path }}">
                {% csrf_token %}
                <div class="modal-header bg-light">
                    <h5 class="modal-title font-weight-bold text-primary"><i class="fas fa-edit mr-2"></i>{{ title }}</h5>
                    <button type="button" class="close" onclick="document.getElementById('editModal').remove();">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    {% for field in form %}
                    <div class="form-group mb-3">
                        <label class="small font-weight-bold text-muted">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-link text-muted" onclick="document.getElementById('editModal').remove();">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save mr-1"></i> Update Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
