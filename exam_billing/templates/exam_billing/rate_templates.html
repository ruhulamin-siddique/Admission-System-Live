{% extends "base.html" %}
{% block title %}Billing Rate Settings{% endblock %}
{% block page_title %}Billing Rate Settings{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <form method="post">
                {% csrf_token %}
                
                {% include "exam_billing/partials/billing_rates_table.html" %}

                <div class="text-center mt-4 mb-5">
                    <button type="submit" class="btn btn-dark btn-lg shadow-lg px-5" style="border-radius: 12px; font-weight: 800; letter-spacing: 1px;">
                        <i class="fas fa-save mr-2"></i> SAVE GLOBAL DEFAULTS
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .billing-table thead th { font-size: 0.8rem; font-weight: 800; color: #475569; border-bottom: 2px solid #e2e8f0; }
    .billing-table td { vertical-align: middle; }
    .billing-table .form-control { 
        border: none; 
        text-align: center; 
        font-weight: 700; 
        color: #1e293b; 
        background: transparent;
        transition: all 0.2s;
    }
    .billing-table .form-control:focus { 
        background: #f8fafc; 
        box-shadow: none; 
        color: #3b82f6;
    }
    .billing-table td:has(input):hover { background-color: #f1f5f9; }
    .bg-gray-light { background-color: #f8fafc; }
    .letter-spacing-1 { letter-spacing: 1px; }
    .italic { font-style: italic; }
</style>
{% endblock %}
