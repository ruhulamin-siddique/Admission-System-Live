<div class="table-responsive">
    <table class="table table-sm table-hover mb-0">
        <thead class="bg-light text-muted small text-uppercase">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
                <th class="text-right">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td class="font-weight-bold">{{ s.student_id }}</td>
                <td>{{ s.student_name }}</td>
                <td>
                    <span class="badge {% if s.admission_status == 'Active' %}badge-success{% else %}badge-danger{% endif %} small">
                        {{ s.admission_status }}
                    </span>
                </td>
                <td class="text-right">
                    <a href="{% url 'student_profile' s.student_id %}" class="btn btn-xs btn-primary">
                        <i class="fas fa-eye"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center py-4 text-muted">No students found for this period.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="mt-3 text-center">
    <a href="{% url 'student_list' %}?program={{ program|urlencode }}{% if period == 'today' %}&admission_date={{ today|date:'Y-m-d' }}{% endif %}" class="btn btn-sm btn-link font-weight-bold">
        View all {{ count }} results in Directory &rarr;
    </a>
</div>
