<div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 15px; overflow: hidden;">
        <div class="modal-header bg-primary text-white border-bottom-0 p-4">
            <h5 class="modal-title font-weight-bold">
                <i class="fas fa-magic mr-2"></i> Mass Data Harmonizer
            </h5>
            <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        
        <form hx-post="{% url 'api_bulk_update_execute' %}" hx-target="#bulk-update-msg">
            {% csrf_token %}
            <input type="hidden" name="student_ids" value="{{ student_ids }}">
            
            <div class="modal-body p-4 bg-light">
                <div class="alert alert-warning border-0 shadow-sm rounded-lg mb-4">
                    <div class="d-flex align-items-center">
                        <div class="mr-3 text-warning">
                            <i class="fas fa-exclamation-triangle fa-2x"></i>
                        </div>
                        <div>
                            <h6 class="font-weight-bold mb-1">Warning: Bulk Action</h6>
                            <p class="mb-0 small">You are about to modify exactly <strong>{{ student_count }}</strong> student records at once. This action cannot be undone.</p>
                        </div>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="font-weight-bold text-dark"><i class="fas fa-database mr-2"></i>1. Select Field to Update</label>
                    <select class="form-control custom-select bg-white border shadow-sm" name="field_name" 
                            hx-get="{% url 'api_bulk_update_field_input' %}" 
                            hx-target="#dynamic-input-container" 
                            hx-trigger="change" required>
                        <option value="">-- Choose Field --</option>
                        {% for field in updatable_fields %}
                        <option value="{{ field.name }}">{{ field.label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group mb-0" id="dynamic-input-container">
                    <!-- Dynamic input will be loaded here -->
                    <div class="text-center p-3 text-muted border rounded border-dashed bg-white shadow-sm">
                        <i class="fas fa-hand-pointer mb-2" style="font-size: 1.5rem;"></i>
                        <p class="mb-0 small">Select a field above to choose its new value.</p>
                    </div>
                </div>
                
                <div id="bulk-update-msg" class="mt-3"></div>
            </div>
            
            <div class="modal-footer bg-white p-3 border-top-0 d-flex justify-content-between">
                <button type="button" class="btn btn-light rounded-pill px-4 shadow-sm" data-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-danger rounded-pill px-4 shadow font-weight-bold">
                    <i class="fas fa-bolt mr-2"></i> Update {{ student_count }} Records
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .border-dashed { border-style: dashed !important; border-width: 2px !important; }
</style>
